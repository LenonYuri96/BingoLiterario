<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bingo Literário - Início</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/index.css">
</head>

<body class="index-body">
    <div class="index-container">
        <h1>📖 Bingo Literário</h1>
        <div class="index-buttons">
            <a href="jogador.html" class="btn btn-success">🎮 Entrar como Jogador</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        // Limpa qualquer estado residual de jogos anteriores
        if (localStorage.getItem("jogoIniciado") !== "true") {
            localStorage.removeItem("jogoFinalizado");
            localStorage.removeItem("vencedor");
            localStorage.removeItem("jogadores");
            localStorage.removeItem("perguntasRestantes");
            localStorage.removeItem("historico");
            localStorage.removeItem("cartelas");
            localStorage.removeItem("sorteioAtual");
        }
    </script>
</body>

</html>
